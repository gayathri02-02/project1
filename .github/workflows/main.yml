name: SBOM Summary Report

on:
  push:
    paths:
      - 'sbom/*.json'        # runs whenever an SBOM is added/updated
  workflow_dispatch: {}      # allow manual run from the Actions tab

permissions:
  contents: write            # needed to push the generated report back

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate summary reports
        run: python3 scripts/generate_summary.py Sbom reports

      - name: Commit and push reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/*.md
          git diff --cached --quiet && echo "No changes" || git commit -m "chore: update SBOM summary report [skip ci]"
          git push
